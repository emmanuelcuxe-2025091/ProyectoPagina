<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de mochilas</title>
</head>
<body bgcolor = "#f2f2f2" style="margin:0;">

    <table width="100%" bgcolor="#2E86C1" height="60"
            border="0" cellspacing="0" cellpadding="15">
        <tr>
            <td width="20%">
                <font color="white" size="5">
                    <b>MOCHILAS</b>
                </font>
            </td>
            
            <td width="60%" align="center">
                <input type="text" size="50" placeholder="Buscar mochila...">
            </td>

            <td width="20%" align="right">
                <img src="../Images/Mochila.png" width="40" height="40">
            </td>
        </tr>
    </table>
    
    <br><br>

    <center>
        <h1 style="font-size:60px; font-family: Impact;">
            Tipos de Mochilas
        </h1>
    </center>

    <br>

    <center>
        <table cellpadding="20">
            <tr align="center">

                <td>
                    <div style="width:120px; height:120px; background-color:#3498DB; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <img src="../Images/JanSport.jpg" width="118" height="118" style="border-radius:50%;">
                    </div>
                    <br>
                    <b>JanSport</b>
                </td>

                <td>
                    <div style="width:120px; height:120px; background-color:#E74C3C; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <img src="../Images/Nike.jpg" width="118" height="118" style="border-radius:50%;">
                    </div>
                    <br>
                    <b>Nike</b>
                </td>

                <td>
                    <div style="width:120px; height:120px; background-color:#2ECC71; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                        <img src="../Images/Adidas.png" width="118" height="118" style="border-radius:50%;">
                    </div>
                    <br>
                    <b>Adidas</b>
                </td>

            </tr>
        </table>
    </center>
    
    <br><br>

</body>
</html>
